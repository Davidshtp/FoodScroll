<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Código de restablecimiento</title>
  <style>
    body { font-family: Arial, sans-serif; color: #333; }
    .card { max-width:600px; margin:20px auto; padding:20px; border:1px solid #eaeaea; border-radius:8px; }
    .code { font-size:24px; font-weight:bold; background:#f7f7f7; padding:10px; display:inline-block; letter-spacing:4px; border-radius:4px; }
    .footer { font-size:12px; color:#666; margin-top:18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Restablecer contraseña</h2>
    <p>Hola {{email}},</p>
    <p>Tu código de restablecimiento es:</p>
    <p class="code">{{code}}</p>
    <p>Válido por {{expiryMinutes}} minutos.</p>
    <div class="footer">
      Si no solicitaste este código, puedes ignorar este mensaje.
    </div>
  </div>
</body>
</html>
